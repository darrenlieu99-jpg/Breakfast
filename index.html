<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --team-a: #1ECFB3;
    --team-b: #FF6B3D;
    --bg-deep: #080C12;
    --bg-panel: #0E1420;
    --bg-card: #141B28;
    --border: rgba(255,255,255,0.07);
    --text-dim: rgba(255,255,255,0.35);
    --text-mid: rgba(255,255,255,0.65);
    --text-bright: rgba(255,255,255,0.95);
  }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    color: var(--text-bright);
    overflow-x: hidden;
    padding: 20px;
  }

  /* subtle grid pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 920px; }

  /* header */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: 6px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .shuttle-icon {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--text-dim);
    border-radius: 50%;
    margin: 0 12px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* sets row */
  .sets-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .sets-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .set-pips {
    display: flex;
    gap: 6px;
  }
  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border-color, rgba(255,255,255,0.2));
    transition: background 0.3s, border-color 0.3s;
  }
  .pip.won { background: var(--pip-color); border-color: var(--pip-color); }

  /* main scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .team {
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    transition: background 0.4s;
  }
  .team.serving::after {
    content: 'SERVING';
    position: absolute;
    top: 14px;
    font-size: 9px;
    letter-spacing: 3px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--team-color);
    color: #000;
  }
  .team.set-won-flash { animation: flashWin 0.5s ease; }
  @keyframes flashWin {
    0% { background: transparent; }
    50% { background: rgba(255,255,255,0.05); }
    100% { background: transparent; }
  }

  .team-players {
    text-align: center;
    line-height: 1.2;
  }
  .player-name {
    display: block;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--team-color);
    text-transform: uppercase;
  }
  .player-amp {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    display: block;
    margin: 4px 0;
  }

  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(90px, 15vw, 140px);
    line-height: 1;
    color: var(--text-bright);
    min-width: 140px;
    text-align: center;
    transition: transform 0.1s;
  }
  .score-display.bump { animation: scoreBump 0.15s ease; }
  @keyframes scoreBump {
    0% { transform: scale(1); }
    60% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    width: 48px; height: 48px;
    border-radius: 8px;
    border: 1.5px solid var(--team-color);
    background: transparent;
    color: var(--team-color);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0;
  }
  .btn:hover { background: rgba(255,255,255,0.06); }
  .btn:active { transform: scale(0.94); }
  .btn.minus {
    border-color: var(--border);
    color: var(--text-dim);
    font-size: 16px;
  }
  .btn.minus:hover { background: rgba(255,255,255,0.04); }

  /* previous sets mini display */
  .prev-sets {
    display: flex;
    gap: 6px;
    min-height: 28px;
    align-items: center;
  }
  .prev-set-score {
    font-size: 13px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--text-mid);
    letter-spacing: 1px;
  }
  .prev-set-score.won-set { color: var(--team-color); background: rgba(255,255,255,0.1); }

  /* divider */
  .divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 12px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .vs-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }
  .set-counter {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
  }

  /* bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-mid); background: rgba(255,255,255,0.04); }
  .ctrl-btn.serve-toggle {
    border-color: rgba(255,255,255,0.15);
    color: var(--text-mid);
  }

  /* win overlay */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-badge {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .win-names {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .win-score-summary {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-mid);
    letter-spacing: 3px;
    margin-bottom: 40px;
  }
  .win-close {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 36px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .win-close:hover { background: rgba(255,255,255,0.08); color: var(--text-bright); }

  /* current set label */
  .set-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: -8px;
  }

  @media (max-width: 600px) {
    .team { padding: 20px 14px; }
    .score-display { font-size: 80px; min-width: 100px; }
    .btn { width: 40px; height: 40px; font-size: 18px; }
    .divider { padding: 16px 10px; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-title">
      Badminton
      <span class="shuttle-icon"></span>
      Best of 3 Sets
      <span class="shuttle-icon"></span>
      21 Points
    </div>
  </div>

  <!-- Sets won row -->
  <div class="sets-row">
    <div class="set-pips" id="pips-a" style="--pip-color: var(--team-a);">
      <div class="pip" data-team="a" data-idx="0"></div>
      <div class="pip" data-team="a" data-idx="1"></div>
    </div>
    <div class="sets-label">Sets</div>
    <div class="set-pips" id="pips-b" style="--pip-color: var(--team-b);">
      <div class="pip" data-team="b" data-idx="0"></div>
      <div class="pip" data-team="b" data-idx="1"></div>
    </div>
  </div>

  <div class="set-label" id="set-label">Set 1</div>

  <div class="scoreboard">
    <!-- Team A -->
    <div class="team serving" id="team-a" style="--team-color: var(--team-a);">
      <div class="team-players">
        <span class="player-name">Bimsara</span>
        <span class="player-amp">&amp;</span>
        <span class="player-name">Gregor</span>
      </div>
      <div class="prev-sets" id="prev-a"></div>
      <div class="score-display" id="score-a">0</div>
      <div class="btn-row">
        <button class="btn minus" onclick="adjustScore('a', -1)">−</button>
        <button class="btn plus" onclick="adjustScore('a', +1)">+</button>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="vs-text">VS</div>
      <div class="set-counter" id="set-counter">Set 1 of 3</div>
    </div>

    <!-- Team B -->
    <div class="team" id="team-b" style="--team-color: var(--team-b);">
      <div class="team-players">
        <span class="player-name">Jasmine</span>
        <span class="player-amp">&amp;</span>
        <span class="player-name">Bernardo</span>
      </div>
      <div class="prev-sets" id="prev-b"></div>
      <div class="score-display" id="score-b">0</div>
      <div class="btn-row">
        <button class="btn minus" onclick="adjustScore('b', -1)">−</button>
        <button class="btn plus" onclick="adjustScore('b', +1)">+</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="ctrl-btn serve-toggle" onclick="toggleServe()">Switch Serve</button>
    <button class="ctrl-btn" onclick="resetSet()">Reset Set</button>
    <button class="ctrl-btn" onclick="resetMatch()">Reset Match</button>
  </div>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="win-overlay">
  <div class="win-badge">Match Winner</div>
  <div class="win-names" id="win-names" style="color: white;"></div>
  <div class="win-score-summary" id="win-summary"></div>
  <button class="win-close" onclick="closeWinScreen()">Continue Playing</button>
</div>

<script>
  const state = {
    scores: { a: 0, b: 0 },
    sets: { a: 0, b: 0 },
    setHistory: [],
    currentSet: 1,
    serving: 'a',
    matchOver: false
  };

  function adjustScore(team, delta) {
    if (state.matchOver) return;
    const opp = team === 'a' ? 'b' : 'a';
    state.scores[team] = Math.max(0, state.scores[team] + delta);
    updateDisplay();

    if (delta > 0) {
      state.serving = team;
      updateServing();
      checkSetWin();
    }

    animateBump(team);
  }

  function checkSetWin() {
    const a = state.scores.a;
    const b = state.scores.b;
    const minWin = 21;
    const maxPts = 30;

    let winner = null;
    if (a >= minWin && a - b >= 2) winner = 'a';
    else if (b >= minWin && b - a >= 2) winner = 'b';
    else if (a >= maxPts || b >= maxPts) winner = a > b ? 'a' : 'b';

    if (winner) {
      state.setHistory.push({ a: state.scores.a, b: state.scores.b, winner });
      state.sets[winner]++;
      flashTeam(winner);
      updatePips();
      updatePrevSets();

      if (state.sets[winner] >= 2) {
        setTimeout(() => showWin(winner), 600);
      } else {
        setTimeout(() => nextSet(winner), 800);
      }
    }
  }

  function nextSet(lastWinner) {
    state.scores.a = 0;
    state.scores.b = 0;
    state.currentSet++;
    state.serving = lastWinner;
    updateDisplay();
    updateServing();
    document.getElementById('set-label').textContent = 'Set ' + state.currentSet;
    document.getElementById('set-counter').textContent = 'Set ' + state.currentSet + ' of 3';
  }

  function showWin(winner) {
    state.matchOver = true;
    const names = winner === 'a' ? 'Bimsara & Gregor' : 'Jasmine & Bernardo';
    const color = winner === 'a' ? 'var(--team-a)' : 'var(--team-b)';
    document.getElementById('win-names').textContent = names;
    document.getElementById('win-names').style.color = color;

    const summary = state.setHistory.map((s, i) =>
      (s.winner === 'a' ? `<span style="color:var(--team-a)">${s.a}</span>–${s.b}` : `${s.a}–<span style="color:var(--team-b)">${s.b}</span>`)
    ).join('  ·  ');
    document.getElementById('win-summary').innerHTML = summary;
    document.getElementById('win-overlay').classList.add('show');
  }

  function closeWinScreen() {
    document.getElementById('win-overlay').classList.remove('show');
  }

  function flashTeam(team) {
    const el = document.getElementById('team-' + team);
    el.classList.add('set-won-flash');
    setTimeout(() => el.classList.remove('set-won-flash'), 600);
  }

  function animateBump(team) {
    const el = document.getElementById('score-' + team);
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function toggleServe() {
    state.serving = state.serving === 'a' ? 'b' : 'a';
    updateServing();
  }

  function updateServing() {
    document.getElementById('team-a').classList.toggle('serving', state.serving === 'a');
    document.getElementById('team-b').classList.toggle('serving', state.serving === 'b');
  }

  function updateDisplay() {
    document.getElementById('score-a').textContent = state.scores.a;
    document.getElementById('score-b').textContent = state.scores.b;
  }

  function updatePips() {
    ['a', 'b'].forEach(t => {
      const pips = document.querySelectorAll(`.pip[data-team="${t}"]`);
      pips.forEach((pip, i) => {
        pip.classList.toggle('won', i < state.sets[t]);
      });
    });
  }

  function updatePrevSets() {
    ['a', 'b'].forEach(t => {
      const container = document.getElementById('prev-' + t);
      container.innerHTML = '';
      state.setHistory.forEach((s, idx) => {
        const span = document.createElement('span');
        span.className = 'prev-set-score' + (s.winner === t ? ' won-set' : '');
        span.style.setProperty('--team-color', t === 'a' ? 'var(--team-a)' : 'var(--team-b)');
        span.textContent = t === 'a' ? s.a : s.b;
        container.appendChild(span);
      });
    });
  }

  function resetSet() {
    state.scores.a = 0;
    state.scores.b = 0;
    updateDisplay();
  }

  function resetMatch() {
    if (!confirm('Reset the entire match?')) return;
    Object.assign(state, {
      scores: { a: 0, b: 0 },
      sets: { a: 0, b: 0 },
      setHistory: [],
      currentSet: 1,
      serving: 'a',
      matchOver: false
    });
    updateDisplay();
    updateServing();
    updatePips();
    document.getElementById('prev-a').innerHTML = '';
    document.getElementById('prev-b').innerHTML = '';
    document.getElementById('set-label').textContent = 'Set 1';
    document.getElementById('set-counter').textContent = 'Set 1 of 3';
    closeWinScreen();
  }
</script>
</body>
</html>
